name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight deps (no torch/gradio needed for tests)
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=1.26,<2.3" "pandas>=2.1" "jsonschema>=4.20" \
                      "rank_bm25>=0.2.2" "scikit-learn>=1.4" "xgboost>=2.0"
      - name: Honeypot rule tests
        run: python tests/test_honeypot.py
      - name: Feature + rubric tests
        run: python tests/test_features.py
      - name: Trap probe (rubric path; model artifact optional)
        run: python src/evaluate.py
