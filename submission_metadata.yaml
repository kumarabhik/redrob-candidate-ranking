# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"   # Claude Code: architecture, implementation, code review, docs

ai_usage_summary: |
  Built with Claude Code as a pair-programmer for architecture, implementation, test
  design, and documentation. All design decisions (the three research pillars, the
  hard/soft honeypot split, the weak-label rubric, the ensemble blend) were human-directed
  and verified by running on the real data. No candidate data was sent to any hosted LLM;
  the ranking step itself makes zero network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-stage, research-grounded pipeline. (A) Hybrid recall: BM25 + dense embeddings fused
  with Reciprocal Rank Fusion (Cormack 2009) to shortlist ~6k of 100k. (B) Structured
  person-job-fit features (Qin et al. SIGIR'18): per-aspect semantic+lexical+career-evidence
  fit for the JD's must-haves, plus seniority band, product-vs-services, behavioral
  availability, location, and explicit trap detectors (wrong-role title, consulting-only,
  keyword-stuffer, job-hopper, research-only). (C) A LambdaMART reranker (XGBoost rank:ndcg)
  trained on weak labels derived from the JD's own rubric (honeypots forced to tier 0),
  late-fused with the rubric and an offline cross-encoder teacher. A deterministic honeypot
  gate (logical-impossibility rules; 40/100k) keeps traps out of the top 100, and reasons are
  assembled only from real profile fields (zero hallucination). Rank step: ~40s, CPU,
  no network. Verified with a trap probe and a 4-way ablation.

